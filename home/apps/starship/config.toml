'$schema' = 'https://starship.rs/config-schema.json'

format = """
[в”Ң](gray)\
$directory\
$username\
$hostname\
$container\
\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
$hg_branch\
$vcsh\
\
$cmd_duration\
$jobs\
$sudo\
$shlvl\
$status\
\
$buf\
$bun\
$c\
$cmake\
$cobol\
$crystal\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$gleam\
$golang\
$gradle\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$lua\
$meson\
$mojo\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$purescript\
$python\
$raku\
$red\
$rlang\
$ruby\
$rust\
$scala\
$solidity\
$spack\
$typst\
$swift\
$vagrant\
$vlang\
$zig\
\
(${env_var.incognito}\
$package\
$nix_shell\
$aws\
$azure\
$docker_context\
$kubernetes\
$terraform)\
\
$line_break\
\
[в””](gray)\
$character"""

add_newline = true
continuation_prompt = '[>](bold gray) '
palette = "milspec_dark"

[character]
success_symbol = '[О»](bold fg)'
error_symbol = '[О»](bold red)'
vimcmd_symbol = '[оҳ«](bold turquoise)'

[time]
format = ' [$time]($style) '
style = 'fg:gray'
disabled = true

[directory]
format = '[$path ]($style)[($read_only)]($read_only_style)'
style = 'fg:red'
read_only = 'пҖЈ '
read_only_style = 'fg:red'
truncate_to_repo = true
use_os_path_sep = false

[username]
format = '[$user ]($style)'
style_root = 'fg:red'
style_user = 'fg:red'

[hostname]
format = '[$ssh_symbol$hostname ]($style)'
style = 'fg:red'
ssh_symbol = '@'

[container]
format = '[$hostname ]($style)'
style = 'fg:red'

### VCS
[git_branch]
format = '[$symbol$branch ]($style)'
style = 'fg:orange'
symbol = 'оңҘ '
ignore_branches = ['main', 'master']

[hg_branch]
format = '[$symbol$branch ]($style)'
style = 'fg:orange'

[git_commit]
format = '[$tag ]($style)'
style = 'fg:orange'
tag_disabled = false
tag_symbol = 'пҖ« '

[git_state]
format = '[\[$state($progress_current/$progress_total)\] ]($style)'
style = 'fg:orange'
disabled = false

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = 'fg:orange'
ahead = 'оӯҒ '
behind = 'оӯҖ '
conflicted = 'у°©Ң '
deleted = 'уұӘў '
diverged = 'уұҗҺ '
modified = 'уұҮЁ '
renamed = 'уұҖұ '
untracked = 'у°»ӯ '
staged = 'уұ§і '
stashed = 'уұ§¶ '
disabled = false

### SHELL STATUS
[cmd_duration]
format = '[п”  $duration ]($style)'
style = 'fg:gold'
show_milliseconds = true
min_time = 2000

[jobs]
disabled = false
symbol = 'п”® '
style = 'fg:gold'

[shlvl]
disabled = false
format = '[$symbol$shlvl]($style) '
style = 'fg:gold'
symbol = 'п…ү '
threshold = 3

[status]
format = '[$symbol$status]($style) '
style = 'fg:gold'
not_executable_symbol = 'оҜһ '
not_found_symbol = 'оӯҺ '
sigint_symbol = 'оӘҜ '
signal_symbol = 'у°һҒ '
symbol = 'у°Ң‘ '
map_symbol = false
disabled = true

[sudo]
disabled = false
format = '[$symbol ]($style)'
style = 'fg:gold'
symbol = 'пҗҪ '

### LANGUAGE VERSION INDICATORS
[buf]
format = '[$symbol($version) ]($style)'
style = 'fg:green'

[bun]
format = '[$symbol($version) ]($style)'
style = 'fg:green'
symbol = 'оқҜ '

[c]
format = '[$symbol($version(-$name)) ]($style)'
style = 'fg:green'
symbol = 'оқұ '

[cmake]
format = '[$symbol($version) ]($style)'
style = 'fg:green'
symbol = 'оһ” '

[cobol]
