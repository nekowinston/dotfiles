### PACKAGE INDICATORS
[package]
symbol = 'п’Ү '
format = '[$symbol$version ]($style)'
style = 'fg:blue'
disabled = false

### CONTEXT INDICATORS
[env_var.incognito]
format = '[$symbol ]($style)'
variable = 'ZSH_INCOGNITO'
style = 'fg:blue'
symbol = 'у°—№ '

# these have `disabled` added so we can toggle them via `starship toggle <name>`
[aws]
disabled = false
format = '[$symbol($profile)(\($region\))(\[$duration\]) ]($style)'
style = 'fg:violet'
symbol = 'оһӯ '

[azure]
disabled = true
format = '[$symbol($subscription)]($style)'
style = 'fg:violet'
symbol = 'оҜҳ '

[docker_context]
disabled = false
format = '[$symbol$context ]($style)'
style = 'fg:violet'
symbol = 'пҢҲ '

[gcloud]
disabled = false
format = '[$symbol$account(@$domain)(\($region\)) ]($style)'
style = 'fg:violet'
symbol = 'оҹұ '

[kubernetes]
disabled = false
format = '[$symbol($cluster/$namespace) ]($style)'
style = 'fg:violet'
symbol = 'уұғҫ '

[openstack]
disabled = false
format = '[$symbol$cloud(\($project\)) ]($style)'
style = 'fg:violet'
symbol = 'оЎ– '

[pulumi]
disabled = false
format = '[$symbol$stack ]($style)'
style = 'fg:blue'
symbol = 'оЎі '

[terraform]
disabled = false
format = '[$symbol$workspace ]($style)'
style = 'fg:violet'
symbol = 'уұҒў '

